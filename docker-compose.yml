version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: unimap-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: unimap_icp_hunter
      MYSQL_USER: unimap_user
      MYSQL_PASSWORD: unimap_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - unimap-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: unimap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - unimap-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: unimap-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - unimap-network

  # UniMap API服务
  unimap-api:
    build:
      context: .
      dockerfile: Dockerfile.unimap
    container_name: unimap-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - UNIMAP_APP_ENV=prod
      - UNIMAP_DATABASE_HOST=mysql
      - UNIMAP_DATABASE_PORT=3306
      - UNIMAP_DATABASE_USERNAME=unimap_user
      - UNIMAP_DATABASE_PASSWORD=unimap_password
      - UNIMAP_DATABASE_NAME=unimap_icp_hunter
      - UNIMAP_REDIS_HOST=redis
      - UNIMAP_REDIS_PORT=6379
      - UNIMAP_FOFA_API_KEY=${FOFA_API_KEY}
      - UNIMAP_FOFA_EMAIL=${FOFA_EMAIL}
      - UNIMAP_HUNTER_API_KEY=${HUNTER_API_KEY}
    depends_on:
      - mysql
      - redis
    networks:
      - unimap-network

  # ICP-Hunter Scheduler
  icp-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.icp
    container_name: icp-scheduler
    restart: unless-stopped
    environment:
      - ICP_APP_ENV=prod
      - ICP_DATABASE_HOST=mysql
      - ICP_DATABASE_PORT=3306
      - ICP_DATABASE_USERNAME=unimap_user
      - ICP_DATABASE_PASSWORD=unimap_password
      - ICP_DATABASE_NAME=unimap_icp_hunter
      - ICP_REDIS_HOST=redis
      - ICP_REDIS_PORT=6379
      - ICP_FOFA_API_KEY=${FOFA_API_KEY}
      - ICP_FOFA_EMAIL=${FOFA_EMAIL}
      - ICP_HUNTER_API_KEY=${HUNTER_API_KEY}
      - ICP_NOTIFICATION_EMAIL_USERNAME=${EMAIL_USERNAME}
      - ICP_NOTIFICATION_EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - ICP_NOTIFICATION_WEBHOOK_URL=${WEBHOOK_URL}
    command: ["scheduler"]
    depends_on:
      - mysql
      - redis
    networks:
      - unimap-network

  # ICP-Hunter Worker (可扩展多个)
  icp-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.icp
    container_name: icp-worker-1
    restart: unless-stopped
    environment:
      - ICP_APP_ENV=prod
      - ICP_DATABASE_HOST=mysql
      - ICP_DATABASE_PORT=3306
      - ICP_DATABASE_USERNAME=unimap_user
      - ICP_DATABASE_PASSWORD=unimap_password
      - ICP_DATABASE_NAME=unimap_icp_hunter
      - ICP_REDIS_HOST=redis
      - ICP_REDIS_PORT=6379
    command: ["worker"]
    depends_on:
      - mysql
      - redis
      - icp-scheduler
    networks:
      - unimap-network

  # 可选：额外的Worker用于扩展
  icp-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.icp
    container_name: icp-worker-2
    restart: unless-stopped
    environment:
      - ICP_APP_ENV=prod
      - ICP_DATABASE_HOST=mysql
      - ICP_DATABASE_PORT=3306
      - ICP_DATABASE_USERNAME=unimap_user
      - ICP_DATABASE_PASSWORD=unimap_password
      - ICP_DATABASE_NAME=unimap_icp_hunter
      - ICP_REDIS_HOST=redis
      - ICP_REDIS_PORT=6379
    command: ["worker"]
    depends_on:
      - mysql
      - redis
      - icp-scheduler
    networks:
      - unimap-network

  # Grafana监控 (可选)
  grafana:
    image: grafana/grafana:latest
    container_name: unimap-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - mysql
      - redis
    networks:
      - unimap-network

volumes:
  mysql_data:
  redis_data:
  minio_data:
  grafana_data:

networks:
  unimap-network:
    driver: bridge
