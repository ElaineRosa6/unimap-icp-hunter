# Redis配置文件
bind 0.0.0.0
port 6379

# 内存限制
maxmemory 2gb
maxmemory-policy allkeys-lru

# 持久化
save 900 1
save 300 10
save 60 10000

# RDB压缩
rdbcompression yes

# AOF
appendonly yes
appendfsync everysec

# 连接设置
timeout 0
tcp-keepalive 300

# 最大客户端连接数
maxclients 10000

# 日志级别
loglevel notice

# 工作目录
dir /data
