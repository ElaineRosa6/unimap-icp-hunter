engines:
    quake:
        enabled: false
        api_key: ""
        base_url: https://quake.360.net/api
        qps: 5
        timeout: 30
        cookies: []
    zoomeye:
        enabled: false
        api_key: ""
        base_url: https://api.zoomeye.org
        qps: 3
        timeout: 30
        cookies: []
    hunter:
        enabled: false
        api_key: ""
        base_url: https://hunter.qianxin.com
        qps: 5
        timeout: 30
        cookies: []
    fofa:
        enabled: false
        api_key: ""
        email: ""
        base_url: https://fofa.info
        web_url: https://fofa.info
        qps: 3
        timeout: 30
        use_web_api: false
        cookies: []
    shodan:
        enabled: false
        api_key: ""
        base_url: https://api.shodan.io
        qps: 1
        timeout: 30
system:
    max_concurrent: 10
    cache_ttl: 3600
    cache_max_size: 1000
    cache_cleanup_interval: 300
    retry_attempts: 3
    user_agent: UniMap-ICP-Hunter/1.0
log:
    level: info
    encoding: console
    file: ""
screenshot:
    enabled: false
    base_dir: ./screenshots
    chrome_path: ""
    proxy_server: ""
    chrome_user_data_dir: ""
    chrome_profile_dir: ""
    chrome_remote_debug_url: http://127.0.0.1:9222
    headless: true
    timeout: 30
    window_width: 1365
    window_height: 768
    wait_time: 500
    auto_capture:
        enabled: false
        capture_search_results: false
        capture_targets: false
web:
    cors:
        allowed_origins:
            - http://localhost:8448
            - http://127.0.0.1:8448
        allowed_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        allowed_headers:
            - Content-Type
            - Authorization
            - X-Requested-With
            - X-WebSocket-Token
        exposed_headers: []
        allow_credentials: false
        max_age: 600
    rate_limit:
        enabled: false
        requests_per_window: 60
        window_seconds: 60
    request_limits:
        max_body_bytes: 10485760
        max_multipart_memory_bytes: 10485760
cache:
    backend: memory
    redis:
        addr: 127.0.0.1:6379
        password: ""
        db: 0
        prefix: 'unimap:'
