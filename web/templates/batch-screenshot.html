<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>批量URL截图 - UniMap</title>
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
	<style>
		.url-list-container {
			display: flex;
			gap: 20px;
			margin-bottom: 20px;
		}
		.url-input-area {
			flex: 1;
		}
		.url-input-area textarea {
			width: 100%;
			min-height: 300px;
			font-family: monospace;
			font-size: 14px;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 4px;
			resize: vertical;
		}
		.url-stats {
			width: 200px;
			padding: 15px;
			background: #f8f9fa;
			border-radius: 4px;
		}
		.url-stats h4 {
			margin-top: 0;
			margin-bottom: 15px;
		}
		.url-stats .stat-item {
			display: flex;
			justify-content: space-between;
			margin-bottom: 10px;
		}
		.url-stats .stat-value {
			font-weight: bold;
			color: #007bff;
		}
		.progress-container {
			margin: 20px 0;
			padding: 15px;
			background: #f8f9fa;
			border-radius: 4px;
			display: none;
		}
		.progress-container.active {
			display: block;
		}
		.progress-bar {
			width: 100%;
			height: 20px;
			background: #e9ecef;
			border-radius: 10px;
			overflow: hidden;
		}
		.progress-bar-fill {
			height: 100%;
			background: #007bff;
			transition: width 0.3s;
		}
		.progress-text {
			text-align: center;
			margin-top: 10px;
		}
		.results-container {
			margin-top: 20px;
		}
		.result-item {
			display: flex;
			align-items: center;
			padding: 10px;
			margin-bottom: 10px;
			border: 1px solid #ddd;
			border-radius: 4px;
			background: #fff;
		}
		.result-item.success {
			border-left: 4px solid #28a745;
		}
		.result-item.failed {
			border-left: 4px solid #dc3545;
		}
		.result-item.pending {
			border-left: 4px solid #ffc107;
		}
		.result-status {
			width: 60px;
			text-align: center;
			font-weight: bold;
		}
		.result-status.success { color: #28a745; }
		.result-status.failed { color: #dc3545; }
		.result-status.pending { color: #ffc107; }
		.result-url {
			flex: 1;
			padding: 0 15px;
			word-break: break-all;
		}
		.result-path {
			width: 200px;
			font-size: 12px;
			color: #666;
		}
		.result-error {
			width: 200px;
			font-size: 12px;
			color: #dc3545;
		}
		.options-group {
			display: flex;
			gap: 20px;
			margin-bottom: 20px;
		}
		.options-group .form-group {
			flex: 1;
		}
		.nav-links {
			margin-bottom: 20px;
		}
		.nav-links a {
			margin-right: 15px;
			text-decoration: none;
			color: #007bff;
		}
		.nav-links a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<header>
		<h1>批量URL截图</h1>
		<p>上传URL列表，批量截图网站页面</p>
	</header>

	<main>
		<div class="nav-links">
			<a href="/">← 返回首页</a>
			<a href="/quota">查看配额</a>
		</div>

		<section class="query-form">
			<h2>URL列表</h2>
			<div class="url-list-container">
				<div class="url-input-area">
					<textarea id="url-list" placeholder="请输入URL列表，每行一个&#10;例如：&#10;https://www.example.com&#10;https://www.google.com&#10;example.org&#10;192.168.1.1:8080"></textarea>
				</div>
				<div class="url-stats">
					<h4>统计信息</h4>
					<div class="stat-item">
						<span>总URL数:</span>
						<span class="stat-value" id="total-urls">0</span>
					</div>
					<div class="stat-item">
						<span>有效URL:</span>
						<span class="stat-value" id="valid-urls">0</span>
					</div>
					<div class="stat-item">
						<span>无效URL:</span>
						<span class="stat-value" id="invalid-urls">0</span>
					</div>
				</div>
			</div>

			<div class="options-group">
				<div class="form-group">
					<label for="concurrency">并发数 (1-10)</label>
					<input type="number" id="concurrency" min="1" max="10" value="5">
				</div>
				<div class="form-group">
					<label for="batch-id">批次ID (可选)</label>
					<input type="text" id="batch-id" placeholder="自动生成">
				</div>
			</div>

			<div class="form-group">
				<button type="button" class="btn" id="btn-start-batch">📷 开始批量截图</button>
				<button type="button" class="btn" id="btn-clear-urls">🗑️ 清空列表</button>
				<button type="button" class="btn" id="btn-load-example">📝 加载示例</button>
				<button type="button" class="btn" id="btn-import-file">📁 导入文件</button>
				<input type="file" id="file-input" accept=".txt,.csv,.xlsx,.xls" style="display: none;">
			</div>

			<div class="progress-container" id="progress-container">
				<div class="progress-bar">
					<div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
				</div>
				<div class="progress-text" id="progress-text">准备中...</div>
			</div>

			<div class="results-container" id="results-container" style="display: none;">
				<h3>截图结果</h3>
				<div id="results-list"></div>
			</div>
		</section>
	</main>

	<footer>
		<p>&copy; 2026 UniMap - 多引擎网络资产查询系统</p>
	</footer>

	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const urlList = document.getElementById('url-list');
			const totalUrlsEl = document.getElementById('total-urls');
			const validUrlsEl = document.getElementById('valid-urls');
			const invalidUrlsEl = document.getElementById('invalid-urls');
			const btnStart = document.getElementById('btn-start-batch');
			const btnClear = document.getElementById('btn-clear-urls');
			const btnExample = document.getElementById('btn-load-example');
			const btnImportFile = document.getElementById('btn-import-file');
			const fileInput = document.getElementById('file-input');
			const progressContainer = document.getElementById('progress-container');
			const progressBarFill = document.getElementById('progress-bar-fill');
			const progressText = document.getElementById('progress-text');
			const resultsContainer = document.getElementById('results-container');
			const resultsList = document.getElementById('results-list');
			const concurrencyInput = document.getElementById('concurrency');
			const batchIdInput = document.getElementById('batch-id');

			// 更新统计
			function updateStats() {
				const urls = urlList.value.split('\n').filter(u => u.trim() !== '');
				const total = urls.length;
				let valid = 0;
				let invalid = 0;

				urls.forEach(url => {
					url = url.trim();
					if (isValidURL(url)) {
						valid++;
					} else {
						invalid++;
					}
				});

				totalUrlsEl.textContent = total;
				validUrlsEl.textContent = valid;
				invalidUrlsEl.textContent = invalid;
			}

			// 验证URL
			function isValidURL(url) {
				url = url.trim();
				if (!url) return false;
				// 简单验证：包含点号或IP格式
				return /^(https?:\/\/)?([\w.-]+)(:\d+)?(\/.*)?$/i.test(url);
			}

			// 监听输入
			urlList.addEventListener('input', updateStats);

			// 清空列表
			btnClear.addEventListener('click', function() {
				urlList.value = '';
				updateStats();
				resultsContainer.style.display = 'none';
				resultsList.innerHTML = '';
			});

			// 导入文件按钮点击
			btnImportFile.addEventListener('click', function() {
				fileInput.click();
			});

			// 文件选择处理
			fileInput.addEventListener('change', async function(e) {
				const file = e.target.files[0];
				if (!file) return;

				const fileName = file.name.toLowerCase();

				// Excel文件需要通过服务器解析
				if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
					const formData = new FormData();
					formData.append('file', file);

					try {
						const response = await fetch('/api/import/urls', {
							method: 'POST',
							body: formData
						});

						if (!response.ok) {
							throw new Error('导入失败: ' + response.statusText);
						}

						const data = await response.json();
						
						if (data.valid === 0) {
							alert('未找到有效的URL，请检查文件内容');
							return;
						}

						// 追加到现有列表
						const existingUrls = urlList.value.split('\n').map(u => u.trim()).filter(u => u);
						const allUrls = [...existingUrls, ...data.urls];
						
						// 去重
						const uniqueUrls = [...new Set(allUrls)];
						
						urlList.value = uniqueUrls.join('\n');
						updateStats();
						
						alert(`成功导入 ${data.valid} 个URL（去重后共 ${uniqueUrls.length} 个）`);
					} catch (error) {
						alert('文件导入失败: ' + error.message);
					}
				} else {
					// TXT/CSV文件客户端解析
					const reader = new FileReader();
					
					reader.onload = function(event) {
						try {
							let urls = [];
							const content = event.target.result;

							if (fileName.endsWith('.csv')) {
								urls = parseCSV(content);
							} else {
								urls = content.split('\n').map(line => line.trim()).filter(line => line);
							}

							const validUrls = urls.filter(url => isValidURL(url));
							
							if (validUrls.length === 0) {
								alert('未找到有效的URL，请检查文件内容');
								return;
							}

							const existingUrls = urlList.value.split('\n').map(u => u.trim()).filter(u => u);
							const allUrls = [...existingUrls, ...validUrls];
							const uniqueUrls = [...new Set(allUrls)];
							
							urlList.value = uniqueUrls.join('\n');
							updateStats();
							
							alert(`成功导入 ${validUrls.length} 个URL（去重后共 ${uniqueUrls.length} 个）`);
						} catch (error) {
							alert('文件解析失败: ' + error.message);
						}
					};

					reader.onerror = function() {
						alert('文件读取失败');
					};

					reader.readAsText(file);
				}

				// 清空input，允许重复选择同一文件
				fileInput.value = '';
			});

			// 解析CSV内容
			function parseCSV(content) {
				const lines = content.split('\n');
				const urls = [];
				
				lines.forEach((line, index) => {
					if (index === 0 && (line.toLowerCase().includes('url') || line.toLowerCase().includes('address'))) {
						return;
					}
					
					const fields = line.split(',');
					if (fields.length > 0) {
						const url = fields[0].trim().replace(/^["']|["']$/g, '');
						if (url) {
							urls.push(url);
						}
					}
				});
				
				return urls;
			}

			// 加载示例
			btnExample.addEventListener('click', function() {
				const examples = [
					'https://www.example.com',
					'https://www.google.com',
					'https://github.com',
					'stackoverflow.com',
					'192.168.1.1:8080'
				];
				urlList.value = examples.join('\n');
				updateStats();
			});

			// 开始批量截图
			btnStart.addEventListener('click', async function() {
				const urls = urlList.value.split('\n')
					.map(u => u.trim())
					.filter(u => u !== '');

				if (urls.length === 0) {
					alert('请输入至少一个URL');
					return;
				}

				if (urls.length > 100) {
					alert('URL数量不能超过100个');
					return;
				}

				const concurrency = parseInt(concurrencyInput.value) || 5;
				const batchId = batchIdInput.value.trim();

				// 显示进度
				progressContainer.classList.add('active');
				progressBarFill.style.width = '0%';
				progressText.textContent = '正在截图...';
				btnStart.disabled = true;

				try {
					const response = await fetch('/api/screenshot/batch-urls', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({
							urls: urls,
							batch_id: batchId,
							concurrency: concurrency
						})
					});

					if (!response.ok) {
						throw new Error('请求失败: ' + response.statusText);
					}

					const data = await response.json();

					// 显示结果
					progressBarFill.style.width = '100%';
					progressText.textContent = `完成: ${data.success} 成功, ${data.failed} 失败`;

					resultsContainer.style.display = 'block';
					resultsList.innerHTML = '';

					data.results.forEach((result, index) => {
						const item = document.createElement('div');
						item.className = 'result-item ' + (result.success ? 'success' : 'failed');

						const statusClass = result.success ? 'success' : 'failed';
						const statusText = result.success ? '成功' : '失败';

						item.innerHTML = `
							<div class="result-status ${statusClass}">${statusText}</div>
							<div class="result-url">${result.url}</div>
							${result.success 
								? `<div class="result-path">${result.file_path}</div>`
								: `<div class="result-error">${result.error}</div>`
							}
						`;
						resultsList.appendChild(item);
					});

				} catch (error) {
					progressText.textContent = '错误: ' + error.message;
					progressBarFill.style.width = '100%';
					progressBarFill.style.background = '#dc3545';
				} finally {
					btnStart.disabled = false;
				}
			});
		});
	</script>
</body>
</html>
